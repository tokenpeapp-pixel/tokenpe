<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="100%" height="100%">
  <defs>
    <!-- Background Gradient inside the icon -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#083E82" />
      <stop offset="100%" stop-color="#00183A" />
    </linearGradient>
    
    <!-- People Gradient (Cyan/Neon Green) -->
    <linearGradient id="peopleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#00D05A" />
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Left: Icon (scaled by 0.51 to fit 280px height perfectly) -->
  <g transform="translate(15, 10) scale(0.51)">
    <!-- Squircle Base -->
    <rect x="40" y="60" width="412" height="412" rx="100" fill="url(#bgGrad)" filter="url(#shadow)" />

    <!-- The "T" shape -->
    <g>
      <!-- Stem -->
      <rect x="224" y="165" width="64" height="150" rx="32" fill="#FFFFFF" />
      <!-- Crossbar -->
      <rect x="116" y="145" width="280" height="60" rx="30" fill="#FFFFFF" />
    </g>

    <!-- Three Avatars -->
    <g>
      <path d="M 142 450 C 142 385, 242 385, 242 450 Z" fill="url(#peopleGrad)" />
      <circle cx="192" cy="335" r="20" fill="url(#peopleGrad)" />
    </g>
    <g>
      <path d="M 270 450 C 270 385, 370 385, 370 450 Z" fill="url(#peopleGrad)" />
      <circle cx="320" cy="335" r="20" fill="url(#peopleGrad)" />
    </g>
    <g>
      <path d="M 200 455 C 200 375, 312 375, 312 455 Z" fill="url(#peopleGrad)" />
      <circle cx="256" cy="320" r="23" fill="url(#peopleGrad)" />
    </g>

    <!-- Badge -->
    <g filter="url(#shadow)">
      <circle cx="380" cy="110" r="48" fill="#00D05A" />
      <circle cx="380" cy="110" r="44" fill="url(#peopleGrad)" />
      <text x="380" y="127" fill="#FFFFFF" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="50" font-weight="900" text-anchor="middle">1</text>
    </g>
  </g>

  <!-- Right: Wordmark Text -->
  <text x="300" y="140" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="120" font-weight="900" letter-spacing="-3">
    <tspan fill="#00204E">Token</tspan><tspan fill="#00D05A">Pe</tspan>
  </text>

  <!-- Middle: Pulse Line -->
  <path d="M 300 180 L 610 180 L 617 180 L 624 162 L 632 202 L 640 180 L 648 180 L 920 180" 
        fill="none" stroke="#00D05A" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />

  <!-- Bottom: Tagline -->
  <text x="310" y="235" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="44" font-weight="700" fill="#00204E" letter-spacing="-0.5">
    Smart Queue. Better Care.
  </text>
</svg>
